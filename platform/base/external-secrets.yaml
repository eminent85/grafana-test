apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-oidc
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: production-secrets
  target:
    name: platform-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: oidc.clientSecret
      remoteRef:
        key: kubernetes/argocd/oidc
        property: clientSecret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-gitops-repository
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: production-secrets
  target:
    name: platform-gitops-repository
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      type: Opaque
      data:
        type: git
        url: https://github.com/example/platform-gitops.git
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: kubernetes/argocd/git
        property: username
    - secretKey: password
      remoteRef:
        key: kubernetes/argocd/git
        property: password

