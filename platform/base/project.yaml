apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-workloads
spec:
  description: Workloads bootstrapped by the platform root ApplicationSet
  sourceRepos:
    - https://github.com/example/platform-gitops.git
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true

