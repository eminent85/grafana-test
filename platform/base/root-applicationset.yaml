apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-root
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/example/platform-gitops.git
        revision: main
        directories:
          - path: clusters/production/*
  template:
    metadata:
      name: "{{ .path.basenameNormalized }}"
      labels:
        platform.example.com/environment: production
    spec:
      project: platform-workloads
      source:
        repoURL: https://github.com/example/platform-gitops.git
        targetRevision: main
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .path.basenameNormalized }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ServerSideApply=true

